# Exposes proxy nodes to the internet via an Ingress controller (e.g. nginx-ingress).
# The control plane Service is intentionally NOT exposed via Ingress.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: proxy-node-ingress
  namespace: reverse-proxy
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    # Uncomment for TLS termination via cert-manager:
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  # tls:
  #   - hosts:
  #       - proxy.example.com
  #     secretName: proxy-tls-cert
  rules:
    - host: proxy.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: proxy-node
                port:
                  name: http
