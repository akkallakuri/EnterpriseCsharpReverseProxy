---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-plane
  namespace: reverse-proxy
  labels:
    app: control-plane
    app.kubernetes.io/part-of: enterprise-reverse-proxy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: control-plane
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: control-plane
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
      containers:
        - name: control-plane
          image: enterprise-proxy/control-plane:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: ASPNETCORE_URLS
              value: "http://+:8080"
            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"
            - name: ControlPlane__ApiKey
              valueFrom:
                secretKeyRef:
                  name: control-plane-secret
                  key: api-key
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      restartPolicy: Always

---
apiVersion: v1
kind: Service
metadata:
  name: control-plane
  namespace: reverse-proxy
  labels:
    app: control-plane
spec:
  selector:
    app: control-plane
  ports:
    - name: http
      port: 80
      targetPort: 8080
  type: ClusterIP          # Not exposed outside the cluster
