---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: proxy-node
  namespace: reverse-proxy
  labels:
    app: proxy-node
    app.kubernetes.io/part-of: enterprise-reverse-proxy
spec:
  replicas: 3
  selector:
    matchLabels:
      app: proxy-node
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 2
  template:
    metadata:
      labels:
        app: proxy-node
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
      # Spread pods across nodes for availability
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: proxy-node
      containers:
        - name: proxy-node
          image: enterprise-proxy/proxy-node:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: ASPNETCORE_URLS
              value: "http://+:8080"
            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"
            - name: ProxyNode__ControlPlaneUrl
              value: "http://control-plane.reverse-proxy.svc.cluster.local"
            - name: ProxyNode__ControlPlaneApiKey
              valueFrom:
                secretKeyRef:
                  name: control-plane-secret
                  key: api-key
            - name: ProxyNode__WatchTimeoutSeconds
              value: "30"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      restartPolicy: Always

---
apiVersion: v1
kind: Service
metadata:
  name: proxy-node
  namespace: reverse-proxy
  labels:
    app: proxy-node
spec:
  selector:
    app: proxy-node
  ports:
    - name: http
      port: 80
      targetPort: 8080
  type: ClusterIP

---
# Horizontal Pod Autoscaler — scale proxy nodes on CPU
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: proxy-node-hpa
  namespace: reverse-proxy
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: proxy-node
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
