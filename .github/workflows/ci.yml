name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: "9.0.x"
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/enterprise-proxy

jobs:
  # ── Build & Test ────────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release --logger "trx;LogFileName=results.trx" \
               --collect:"XPlat Code Coverage"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/TestResults/*.trx"

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: "**/TestResults/**/coverage.cobertura.xml"

  # ── Docker Build & Push ─────────────────────────────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - service: control-plane
            dockerfile: src/ControlPlane/Dockerfile
          - service: proxy-node
            dockerfile: src/ProxyNode/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to Kubernetes ────────────────────────────────────────────────────
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config

      - name: Set image tag
        id: tag
        run: echo "SHA_TAG=sha-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Update image tags in manifests
        run: |
          IMAGE_BASE="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}"
          TAG="${{ steps.tag.outputs.SHA_TAG }}"
          sed -i "s|enterprise-proxy/control-plane:latest|${IMAGE_BASE}/control-plane:${TAG}|g" \
            deploy/kubernetes/control-plane.yaml
          sed -i "s|enterprise-proxy/proxy-node:latest|${IMAGE_BASE}/proxy-node:${TAG}|g" \
            deploy/kubernetes/proxy-node.yaml

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f deploy/kubernetes/namespace.yaml
          kubectl apply -f deploy/kubernetes/secret.yaml   # pre-populated via external secrets
          kubectl apply -f deploy/kubernetes/control-plane.yaml
          kubectl apply -f deploy/kubernetes/proxy-node.yaml
          kubectl apply -f deploy/kubernetes/ingress.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/control-plane -n reverse-proxy --timeout=3m
          kubectl rollout status deployment/proxy-node    -n reverse-proxy --timeout=3m
